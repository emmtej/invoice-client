# Security headers shared across all locations.
# nginx's add_header does not inherit when a child location declares its own,
# so we reuse this snippet inside every location block that overrides cache headers.
#
# HSTS is intentionally omitted: this container listens on port 80 (plaintext HTTP).
# Per RFC 6797 §8.1, browsers MUST ignore Strict-Transport-Security headers received
# over non-secure transport. Add HSTS at the TLS-terminating proxy in front of this
# image (Cloudflare, AWS ALB, an nginx fronting it with TLS, etc.) — not here.

map $sent_http_content_type $csp_header {
    default "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; worker-src 'self' blob:; connect-src 'self' blob:; img-src 'self' data: blob:;";
}

server {
    listen 80;
    server_name localhost;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Security headers at server level — applied when no child block redeclares add_header.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy $csp_header always;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively; HTML never.
        # Each child location must re-declare every header it wants — nginx does NOT
        # merge add_header from parent blocks once a child declares any of its own.
        location ~* \.(js|css|woff2|woff|ttf|svg|png|jpg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy $csp_header always;
        }

        location = /index.html {
            add_header Cache-Control "no-store" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy $csp_header always;
        }
    }
}
